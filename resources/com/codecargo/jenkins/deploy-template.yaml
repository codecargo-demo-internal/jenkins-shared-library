apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{SERVICE_NAME}}'
  namespace: '{{NAMESPACE}}'
  labels:
    app: '{{SERVICE_NAME}}'
    version: '{{VERSION}}'
spec:
  replicas: '{{REPLICAS}}'
  selector:
    matchLabels:
      app: '{{SERVICE_NAME}}'
  template:
    metadata:
      labels:
        app: '{{SERVICE_NAME}}'
        version: '{{VERSION}}'
    spec:
      containers:
        - name: '{{SERVICE_NAME}}'
          image: '{{IMAGE}}'
          ports:
            - containerPort: '{{PORT}}'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: '{{PORT}}'
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: '{{PORT}}'
            initialDelaySeconds: 5
            periodSeconds: 5
